remote_learn_command:
  name: Learn command
  description: Put the Xiaomi Miio IR device into learning mode and capture the next infrared command.
  target:
    entity:
      domain: remote
      integration: xiaomi_miio_ir
  fields:
    timeout:
      name: Timeout
      description: Maximum time to wait for the infrared command, in seconds. Leave empty to use the integration's configured default learn timeout.
      selector:
        number:
          min: 1
          max: 300
          step: 1
          unit_of_measurement: seconds
    slot:
      name: Slot
      description: Device storage slot used while learning the command. Leave empty to use the entity's configured default learn slot.
      selector:
        number:
          min: 1
          max: 1000000
          step: 1
