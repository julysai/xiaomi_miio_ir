remote_learn_command:
  name: Learn command
  description: Put the Xiaomi Miio IR device into learning mode and capture the next infrared command.
  target:
    entity:
      domain: remote
      integration: xiaomi_miio_ir
  fields:
    timeout:
      name: Timeout
      description: Maximum time to wait for the infrared command, in seconds.
      default: 30
      selector:
        number:
          min: 1
          max: 300
          step: 1
          unit_of_measurement: seconds
    slot:
      name: Slot
      description: Device storage slot used while learning the command.
      default: 1
      selector:
        number:
          min: 1
          max: 1000000
          step: 1
